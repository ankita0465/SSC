{% load static %}
<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Event Feedback - SSC</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Montserrat:wght@700;800&family=Poppins:wght@500;600&family=Inter:wght@400;500;600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        theme: {
            extend: {
                colors: { primary: "#264dd9" },
                fontFamily: {
                    "montserrat": ["Montserrat"],
                    "body": ["Inter"]
                }
            }
        }
    }
</script>
<style>
    body {
        font-family: 'Inter', sans-serif;
        background-color: #f7f9fe;
    }
</style>
</head>
<body class="text-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-[1.5rem] shadow-xl border border-slate-100 p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <span class="material-symbols-outlined text-4xl text-primary mb-2">rate_review</span>
            <h1 class="text-2xl font-bold font-montserrat text-slate-900">Event Feedback</h1>
            <p class="text-sm text-slate-500 mt-1">Leave your feedback for <br/> <strong class="text-primary">{{ event.title }}</strong></p>
        </div>

        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for message in messages %}
            <div class="p-4 rounded-xl text-sm font-medium {% if message.tags == 'error' %}bg-rose-50 text-rose-600 border border-rose-100{% else %}bg-teal-50 text-teal-600 border border-teal-100{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'event_feedback' event.event_id %}" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="rating" class="block text-sm font-bold text-slate-700 mb-2">Rate the Event (1-5)</label>
                <select name="rating" id="rating" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                    <option value="5" {% if feedback and feedback.rating == 5 %}selected{% endif %}>5 - Excellent</option>
                    <option value="4" {% if feedback and feedback.rating == 4 %}selected{% endif %}>4 - Very Good</option>
                    <option value="3" {% if feedback and feedback.rating == 3 %}selected{% endif %}>3 - Average</option>
                    <option value="2" {% if feedback and feedback.rating == 2 %}selected{% endif %}>2 - Poor</option>
                    <option value="1" {% if feedback and feedback.rating == 1 %}selected{% endif %}>1 - Terrible</option>
                </select>
            </div>

            <div>
                <label for="comments" class="block text-sm font-bold text-slate-700 mb-2">Your Comments</label>
                <textarea name="comments" id="comments" rows="4" placeholder="Tell us what you liked or how we can improve..." class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all resize-none">{{ feedback.comments|default:"" }}</textarea>
            </div>

            <div class="flex gap-4 pt-4 mt-8">
                <a href="{% url 'dashboard' %}" class="w-1/3 flex items-center justify-center py-3 px-4 rounded-xl font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
                    Back
                </a>
                <button type="submit" class="w-2/3 flex items-center justify-center gap-2 py-3 px-4 rounded-xl font-bold text-white bg-[#264dd9] hover:bg-[#1a3bb0] shadow-lg shadow-[#264dd9]/20 transition-all">
                    <span>
                        {% if feedback %}
                            Update Feedback
                        {% else %}
                            Submit Feedback
                        {% endif %}
                    </span>
                    <span class="material-symbols-outlined text-sm">send</span>
                </button>
            </div>
        </form>
    </div>

</body>
</html>
