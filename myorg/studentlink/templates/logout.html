{% load static %}
<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Logged Out - SSC</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#264dd9",
                        "background": "#f7f9fe",
                        "surface": "#f7f9fe"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "montserrat": ["Montserrat"],
                        "poppins": ["Poppins"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        @keyframes countdown {
            from { width: 100%; }
            to   { width: 0%; }
        }
        .card-anim   { animation: fadeInUp 0.5s ease-out both; }
        .icon-anim   { animation: scaleIn 0.4s 0.2s ease-out both; }
        .progress-bar{ animation: countdown 5s linear forwards; }
    </style>
</head>
<body class="bg-background text-slate-900 font-body min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Decorative blobs -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-blue-200/30 blur-3xl rounded-full pointer-events-none"></div>
    <div class="absolute bottom-10 -right-20 w-80 h-80 bg-indigo-200/20 blur-3xl rounded-full pointer-events-none"></div>

    <!-- Card -->
    <div class="card-anim relative z-10 w-full max-w-md bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">

        <!-- Top accent bar -->
        <div class="h-1.5 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500"></div>

        <div class="p-10 text-center">

            <!-- Icon -->
            <div class="icon-anim w-24 h-24 bg-green-50 border-2 border-green-100 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                <span class="material-symbols-outlined text-green-500 text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>

            <!-- Heading -->
            <h1 class="text-3xl font-bold font-montserrat text-slate-900 tracking-tight mb-3">See You Soon!</h1>
            <p class="text-slate-500 text-base mb-1">You have been <span class="font-semibold text-slate-700">logged out</span> successfully.</p>
            <p class="text-slate-400 text-sm mb-8">Thank you for using Smart Student Community.</p>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <a href="{% url 'home' %}"
                   class="flex-1 inline-flex items-center justify-center py-3.5 bg-primary text-white font-bold rounded-xl active:scale-95 transition-all font-poppins gap-2 text-sm">
                    <span class="material-symbols-outlined text-lg">home</span>
                    Go to Home Page
                </a>
            </div>
        </div>
    </div>
</body>
</html>
